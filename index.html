<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup Portal</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f4f4f4;
        }
        .form-container, .async-container {
            background: white;
            padding: 25px;
            border-radius: 8px;
            max-width: 450px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"], input[type="email"], input[type="password"] {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .error-message {
            color: red;
            font-size: 0.85em;
            display: block;
            margin-top: 5px;
            height: 18px;
        }
        button {
            padding: 10px 15px;
            border: none;
            background-color: #007BFF;
            color: white;
            border-radius: 4px;
            cursor: pointer;
        }
        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        hr {
            margin: 30px 0;
        }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>Signup Portal</h2>
        <form id="signupForm" novalidate>
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter username">
                <span id="usernameError" class="error-message"></span>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Enter email">
                <span id="emailError" class="error-message"></span>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter password">
                <span id="passwordError" class="error-message"></span>
            </div>

            <div class="form-group">
                <label>
                    <input type="checkbox" id="terms"> I agree to the Terms and Conditions
                </label>
                <span id="termsError" class="error-message"></span>
            </div>

            <button type="submit">Sign Up</button>
        </form>
    </div>

    <div class="form-container">
        <h3>Verification</h3>
        <button id="resendBtn" disabled>Resend Verification (10s)</button>
    </div>

    <div class="async-container">
        <h3>Asynchronous & Synchronous Tasks</h3>
        <p>Open your browser's Developer Console (F12) to view the output logs for Question 1 and Question 2.</p>
        <button onclick="runSynchronousDemo()">Run Question 1 (Sync Demo)</button>
        <button onclick="runFetchStudentsDemo()">Run Question 2 (setTimeout Demo)</button>
    </div>

    <script src="validation.js"></script>
    <script src="async.js"></script>
</body>
</html>
